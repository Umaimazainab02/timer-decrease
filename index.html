<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="first.css">
    <title>Timer decrease</title>
</head>

<body class="flex flex-col justify-center items-center mt-30 bg-gray-900 text-white">
    <!--Question no 1-->

    <div>
        <div class="border-4 border-purple-700 bg-purple-700 rounded-xl pl-30 pr-30 pt-5">
            <h1 class="text-4xl font-bold mb-10" id="">Timer</h1>
            <h1 id="timer" class="text-6xl font-bold mb-10 pl-6">10</h1>
            <button id="button"
                class="w-30 bg-red-800 text-white py-3 mb-20 rounded-lg font-semibold hover:bg-pink-700 transition duration-300">
                Click
            </button>
        </div>
    </div>

    <!--Question no 2-->
    <div
        class="flex flex-col justify-center items-center mt-30 border-4 border-sky-300 text-white rounded-2xl w-100 h-100">
        <h1 class="mb-30 text-4xl" id="currentyear">Current year</h1>
        <button id="yearbtn"
            class="border-5 border-blue-400 w-30 rounded-2xl text-3xl font-bold p-3 bg-amber-50 text-black">Click</button>

    </div>

    <!--Question no 3-->
    <div
        class="flex flex-col justify-center items-center mt-30 border-4 border-sky-300 text-white rounded-2xl w-100 h-100">
        <h1 class="mb-30 text-4xl" id="currentdate">Current date</h1>
        <button id="datebtn"
            class="border-5 border-blue-400 w-30 rounded-2xl text-3xl font-bold p-3 bg-amber-50 text-black">Click</button>

    </div>

    <!--Question no 4-->
    <div
        class="flex flex-col justify-center items-center mt-30 border-4 border-sky-300 text-white rounded-2xl w-100 h-100">
        <h1 class="mb-30 text-4xl" id="currentmonth">Current month</h1>
        <button id="monthbtn"
            class="border-5 border-blue-400 w-30 rounded-2xl text-3xl font-bold p-3 bg-amber-50 text-black">Click</button>

    </div>

    <!--Question no 5-->
    <div
        class="flex flex-col justify-center items-center mt-30 border-4 border-sky-300 text-white rounded-2xl w-100 h-100">
        <h1 class="mb-30 text-4xl" id="currentday">Current day</h1>
        <button id="daybtn"
            class="border-5 border-blue-400 w-30 rounded-2xl text-3xl font-bold p-3 bg-amber-50 text-black">Click</button>

    </div>

    <!--Question no 06-->
    <div
        class="flex flex-col justify-center items-center mt-30 border-4 border-sky-300 text-white rounded-2xl w-100 h-100">
        <h1 class="mb-30 text-4xl" id="greeting">Greeting</h1>
        <button id="greetingbtn"
            class="border-5 border-blue-400 w-30 rounded-2xl text-3xl font-bold p-3 bg-amber-50 text-black">Click</button>

    </div>


    <!--Question no 07-->
    <div
        class="flex flex-col justify-center items-center mt-30 border-4 border-sky-300 text-white rounded-2xl w-100 h-100">
        <h1 class="mb-30 text-4xl" id="clock"></h1>
        <button id="clockbtn"
            class="border-5 border-blue-400 w-30 rounded-2xl text-3xl font-bold p-3 bg-amber-50 text-black">Click</button>

    </div>





    <script src="app.js"></script>

</body>

</html>
